<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jules Kanban - Home</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/main.css">
</head>
<body>
    <div class="theme-switch-container">
        <label class="theme-switch" for="theme-switch-checkbox">
            <input type="checkbox" id="theme-switch-checkbox" />
            <div class="slider round">
                <span class="icon sun-icon">
                    <svg viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>
                </span>
                <span class="icon moon-icon">
                    <svg viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
                </span>
            </div>
        </label>
    </div>

    <div class="main-container">
        <h1 class="page-title">Jules Kanban</h1>
        <button id="create-board-btn">Create New Board</button>
        <div id="boards-container">
            <!-- Board cards will be dynamically inserted here -->
            <!-- Example: <a href="index.html?boardId=123" class="board-card">Board Name 1</a> -->
        </div>
    </div>

    <div id="new-board-modal" class="modal-overlay" style="display: none;">
        <div class="modal-content">
            <h2>Create New Kanban Board</h2>
            <label for="new-board-name-input" class="modal-label">Board Name:</label>
            <input type="text" id="new-board-name-input" class="modal-input" placeholder="Enter board name...">
            <div class="modal-actions">
                <button id="cancel-create-board-btn" class="modal-button cancel-btn">Cancel</button>
                <button id="confirm-create-board-btn" class="modal-button confirm-btn">Create Board</button>
            </div>
        </div>
    </div>

    <script src="assets/js/main.js"></script>
    <script>
        // Minimal theme switcher logic for main.html, can be expanded or moved to main.js
        // Consider moving this into main.js if it's not already fully covered there.
        // For now, assuming main.js might not yet have theme logic or this is a quick setup.
        const themeSwitchMain = document.getElementById('theme-switch-checkbox');
        const bodyElementMain = document.body;

        function applyTheme(isLightMode) {
            if (isLightMode) {
                bodyElementMain.classList.add('light-mode');
                themeSwitchMain.checked = true;
                localStorage.setItem('theme', 'light');
            } else {
                bodyElementMain.classList.remove('light-mode');
                themeSwitchMain.checked = false;
                localStorage.setItem('theme', 'dark');
            }
        }

        themeSwitchMain.addEventListener('change', () => {
            applyTheme(themeSwitchMain.checked);
        });

        const currentTheme = localStorage.getItem('theme');
        if (currentTheme === 'light') {
            applyTheme(true);
        } else {
            applyTheme(false); // Default to dark
        }
    </script>
</body>
</html>
