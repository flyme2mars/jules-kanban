<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kanban Board</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Jules Kanban</h1>
    <div class="kanban-board">
        <div class="column" id="todo">
            <h2>To Do</h2>
            <div class="tasks">
                <div class="task" draggable="true" id="test-task-1"><span>Test Task 1</span><span class="delete-task-btn">X</span></div>
                <div class="task" draggable="true" id="test-task-2"><span>Test Task 2</span><span class="delete-task-btn">X</span></div>
                <div class="task" draggable="true" id="test-task-3"><span>Test Task 3</span><span class="delete-task-btn">X</span></div>
                <div class="task" draggable="true" id="test-task-4"><span>Test Task 4</span><span class="delete-task-btn">X</span></div>
                <div class="task" draggable="true" id="test-task-5"><span>Test Task 5</span><span class="delete-task-btn">X</span></div>
                <div class="task" draggable="true" id="test-task-6"><span>Test Task 6</span><span class="delete-task-btn">X</span></div>
                <div class="task" draggable="true" id="test-task-7"><span>Test Task 7</span><span class="delete-task-btn">X</span></div>
                <div class="task" draggable="true" id="test-task-8"><span>Test Task 8</span><span class="delete-task-btn">X</span></div>
            </div>
            <input type="text" class="new-task-input" placeholder="Add new task...">
            <button class="add-task-btn">Add Task</button>
        </div>
        <div class="column" id="inprogress">
            <h2>In Progress</h2>
            <div class="tasks"></div>
            <input type="text" class="new-task-input" placeholder="Add new task...">
            <button class="add-task-btn">Add Task</button>
        </div>
        <div class="column" id="done">
            <h2>Done</h2>
            <div class="tasks"></div>
            <input type="text" class="new-task-input" placeholder="Add new task...">
            <button class="add-task-btn">Add Task</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
